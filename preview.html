<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inyector de Logo en Index</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial;
  text-align: center;
  padding: 40px;
}

.box {
  border: 2px dashed #555;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

button {
  padding: 10px 20px;
  background: #0f0;
  border: none;
  cursor: pointer;
  margin-top: 20px;
}

textarea {
  width: 100%;
  height: 200px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>⚡ Inyector de Logo en Index</h1>

<div class="box">
  <h3>1. Cargar index.html</h3>
  <input type="file" id="indexFile" accept=".html">
</div>

<div class="box">
  <h3>2. Cargar logo</h3>
  <input type="file" id="logoFile" accept="image/*">
</div>

<button onclick="procesar()">🚀 Generar nuevo index</button>

<textarea id="output" placeholder="Acá aparece el nuevo index..."></textarea>

<button onclick="descargar()">💾 Descargar index.html</button>

<script>

let indexContent = "";
let logoBase64 = "";

document.getElementById("indexFile").addEventListener("change", function(){
  const file = this.files[0];
  const reader = new FileReader();
  reader.onload = e => indexContent = e.target.result;
  reader.readAsText(file);
});

document.getElementById("logoFile").addEventListener("change", function(){
  const file = this.files[0];
  const reader = new FileReader();
  reader.onload = e => logoBase64 = e.target.result;
  reader.readAsDataURL(file);
});

function procesar(){

  if(!indexContent || !logoBase64){
    alert("Falta cargar index o logo");
    return;
  }

  let nuevo = indexContent;

  // NAVBAR
  nuevo = nuevo.replace(/id="navbar-logo-img"[^>]*src="[^"]*"/,
    `id="navbar-logo-img" src="${logoBase64}"`);

  // PRELOADER
  nuevo = nuevo.replace(/id="preloader-logo-img"[^>]*src="[^"]*"/,
    `id="preloader-logo-img" src="${logoBase64}"`);

  // FOOTER
  nuevo = nuevo.replace(/id="footer-logo-img"[^>]*src="[^"]*"/,
    `id="footer-logo-img" src="${logoBase64}"`);

  // FAVICON
  nuevo = nuevo.replace(/<link rel="icon"[^>]*>/,
    `<link rel="icon" type="image/png" href="${logoBase64}">`);

  document.getElementById("output").value = nuevo;
}

function descargar(){
  const blob = new Blob([document.getElementById("output").value], {type: "text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "index.html";
  a.click();
}

</script>

</body>
</html>
