<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<script>!function(){var v='117';if(location.search.indexOf('v='+v)<0){var u=new URL(location.href);u.searchParams.set('v',v);location.replace(u.toString());}}();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Fotos del Evento — Cristian Romero Producciones</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0a0f;
  --cyan:   #00d4e8;
  --gold:   #c9a84c;
  --white:  #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--white); font-family:'Montserrat',sans-serif; font-weight:300; overflow-x:hidden; }

/* CURSOR */
body.custom-cursor *, body.custom-cursor *::before, body.custom-cursor *::after { cursor:none !important; }
#lightbox.active, #lightbox.active * { cursor:auto !important; }
#lightbox.active button { cursor:pointer !important; }
#cursor { position:fixed; width:10px; height:10px; background:var(--cyan); border-radius:50%; pointer-events:none; z-index:9999; left:0; top:0; transform:translate(-50%,-50%); mix-blend-mode:difference; transition:opacity .3s; }
#cursor-ring { position:fixed; width:36px; height:36px; border:1px solid rgba(0,212,232,.5); border-radius:50%; pointer-events:none; z-index:9998; left:0; top:0; transform:translate(-50%,-50%); transition:transform .12s ease-out; }

/* GRAIN */
#grain { position:fixed; inset:0; z-index:300; pointer-events:none; opacity:.025; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:200px; }

/* LOADING */
#loading-screen { position:fixed; inset:0; z-index:500; background:var(--bg); display:flex; align-items:center; justify-content:center; transition:opacity .6s; }
#loading-screen.hidden { opacity:0; pointer-events:none; }
.loading-text { font-size:11px; letter-spacing:.4em; text-transform:uppercase; color:rgba(255,255,255,.3); animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

/* UNAVAILABLE */
#unavailable { display:none; position:fixed; inset:0; z-index:400; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; padding:40px; }
#unavailable .msg-title { font-family:'Cormorant Garamond',serif; font-size:clamp(24px,5vw,40px); font-weight:300; font-style:italic; color:var(--white); }
#unavailable .msg-sub { font-size:11px; letter-spacing:.4em; text-transform:uppercase; color:rgba(255,255,255,.3); }

/* HERO */
#hero { position:relative; width:100%; height:100vh; height:100dvh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
#hero.hidden { display:none; }
#hero-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(.42) saturate(1.1); animation:heroZoom 20s ease-in-out infinite alternate; }
@keyframes heroZoom { from{transform:scale(1.03)} to{transform:scale(1.12)} }
.hero-overlay { position:absolute; inset:0; background:radial-gradient(ellipse at 20% 80%,rgba(123,47,212,.45) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(0,212,232,.3) 0%,transparent 55%),linear-gradient(to bottom,rgba(10,10,15,.1) 0%,rgba(10,10,15,.75) 100%); }
.hero-content { position:relative; z-index:2; text-align:center; padding:20px; animation:fadeUp 1.8s cubic-bezier(.16,1,.3,1) forwards; opacity:0; }
@keyframes fadeUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
.hero-logo-seal { width:72px; height:72px; margin:0 auto 24px; display:none; }
.hero-logo { width:100%; height:100%; object-fit:contain; filter:invert(1); mix-blend-mode:color-dodge; border-radius:50%; }
.hero-brand { font-size:clamp(9px,1.3vw,11px); letter-spacing:.5em; text-transform:uppercase; color:var(--cyan); margin-bottom:20px; opacity:.85; }
.hero-nombres { font-family:'Cormorant Garamond',serif; font-weight:300; font-style:italic; font-size:clamp(40px,7vw,88px); line-height:1; color:var(--white); text-shadow:0 0 60px rgba(0,212,232,.2); margin-bottom:10px; }
.hero-divider { display:flex; align-items:center; justify-content:center; gap:12px; margin:14px 0; }
.hero-divider::before { content:''; flex:1; max-width:80px; height:1px; background:linear-gradient(to right,transparent,rgba(201,168,76,.6)); }
.hero-divider::after  { content:''; flex:1; max-width:80px; height:1px; background:linear-gradient(to left,transparent,rgba(201,168,76,.6)); }
.hero-divider-star { color:var(--gold); font-size:12px; }
.hero-fecha { font-size:clamp(10px,1.3vw,13px); letter-spacing:.4em; text-transform:uppercase; color:rgba(255,255,255,.55); }
#hero-idea { margin-top:20px; font-size:clamp(13px,1.8vw,16px); letter-spacing:.08em; color:#fff; text-shadow:0 1px 12px rgba(0,0,0,.8); min-height:24px; opacity:0; transform:translateY(10px); transition:opacity .55s ease, transform .55s ease; }
#hero-idea.visible { opacity:1; transform:translateY(0); }
#hero-idea.out { opacity:0; transform:translateY(-8px); }
#upload-hint { position:fixed; right:96px; bottom:42px; z-index:199; display:none; align-items:center; gap:10px; color:rgba(255,255,255,.65); font-size:9px; letter-spacing:.25em; text-transform:uppercase; pointer-events:none; animation:hint-slide 1.2s ease-in-out infinite; }
#upload-hint span { animation:hint-text-fade 0.6s ease forwards 4s; }
.hint-arrow { width:14px; height:14px; border-right:1.5px solid rgba(0,212,232,.9); border-bottom:1.5px solid rgba(0,212,232,.9); transform:rotate(-45deg); flex-shrink:0; }
@keyframes hint-slide { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }
@keyframes hint-text-fade { to { opacity:0; width:0; overflow:hidden; margin:0; } }

/* GALLERY */
#gallery-section { padding:60px 24px 140px; max-width:1200px; margin:0 auto; }
#gallery-section.hidden { display:none; }
.gallery-header { text-align:center; margin-bottom:40px; }
.gallery-header-eyebrow { font-size:10px; letter-spacing:.4em; text-transform:uppercase; color:var(--cyan); margin-bottom:10px; opacity:.7; }
.gallery-header-title { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,5vw,48px); font-weight:300; font-style:italic; }
.gallery-count { text-align:center; margin-bottom:24px; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:rgba(255,255,255,.3); }
#gallery-grid { columns:2; column-gap:10px; }
@media (min-width:640px) { #gallery-grid { columns:3; } }
@media (min-width:1024px) { #gallery-grid { columns:4; } }
.gallery-item { position:relative; break-inside:avoid; margin-bottom:10px; overflow:hidden; cursor:pointer !important; }
.gallery-item img { width:100%; display:block; transition:transform .4s ease; }
.gallery-item:hover img { transform:scale(1.03); }
.photo-heart { position:absolute; bottom:8px; right:8px; display:flex; align-items:center; gap:4px; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); border-radius:20px; padding:5px 8px 5px 7px; cursor:pointer !important; transition:transform .15s; z-index:2; -webkit-tap-highlight-color:transparent; }
.photo-heart:active { transform:scale(.88); }
.photo-heart.liked svg { filter:drop-shadow(0 0 5px rgba(255,77,109,.7)); }
.photo-heart span { font-size:11px; font-weight:600; color:#fff; line-height:1; min-width:10px; }
.photo-winner { position:absolute; top:8px; left:8px; font-size:20px; z-index:2; filter:drop-shadow(0 2px 6px rgba(0,0,0,.7)); pointer-events:none; }
.gallery-empty { text-align:center; padding:60px 20px; color:rgba(255,255,255,.2); font-size:13px; letter-spacing:.2em; }
.gallery-closed-notice { text-align:center; padding:12px 20px; margin-bottom:20px; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:rgba(255,255,255,.3); border:1px solid rgba(255,255,255,.08); }

/* TV SLIDESHOW */
#tv-mode { display:none; position:fixed; inset:0; background:#000; z-index:10; }
#tv-mode.active { display:block; }
#tv-slide { position:absolute; inset:0; background-size:contain; background-repeat:no-repeat; background-position:center; background-color:#000; transition:opacity .8s ease; }
#tv-slide.fade-out { opacity:0; }
#tv-overlay { position:absolute; bottom:0; left:0; right:0; padding:20px 40px; background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 100%); display:flex; align-items:center; gap:20px; }
#tv-logo { width:44px; height:44px; border-radius:50%; object-fit:contain; display:none; filter:invert(1); mix-blend-mode:color-dodge; }
#tv-nombre { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(18px,2.5vw,32px); font-weight:300; color:rgba(255,255,255,.8); }
#tv-qr-wrap { margin-left:auto; display:flex; flex-direction:column; align-items:center; gap:6px; }
#tv-qr-img { width:120px; height:120px; border-radius:8px; background:#fff; padding:5px; display:block; }
#tv-qr-label { font-size:9px; letter-spacing:.25em; text-transform:uppercase; color:rgba(255,255,255,.35); }
#tv-no-fotos { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
#tv-no-fotos .nf-title { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(32px,5vw,64px); color:rgba(255,255,255,.7); }
#tv-no-fotos .nf-sub { font-size:11px; letter-spacing:.4em; text-transform:uppercase; color:rgba(255,255,255,.25); }

/* UPLOAD FAB */
#btn-upload { display:none; position:fixed; bottom:28px; right:28px; z-index:200; width:56px; height:56px; border-radius:50%; background:var(--gold); border:none; color:#000; font-size:28px; font-weight:300; line-height:1; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,0,0,.4); transition:transform .2s; cursor:pointer !important; }
#btn-upload:hover { transform:scale(1.08); }
#upload-progress { display:none; position:fixed; bottom:96px; right:24px; z-index:201; background:rgba(0,0,0,.85); border:1px solid rgba(255,255,255,.12); padding:10px 18px; font-size:11px; letter-spacing:.2em; color:rgba(255,255,255,.6); }

/* TOAST */
#toast { position:fixed; bottom:108px; left:50%; transform:translateX(-50%) translateY(20px); z-index:400; background:rgba(0,0,0,.9); border:1px solid rgba(255,255,255,.12); padding:12px 24px; font-size:12px; letter-spacing:.15em; color:var(--white); opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; text-align:center; max-width:320px; white-space:normal; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* LIGHTBOX */
#lightbox { display:none; position:fixed; inset:0; z-index:600; background:rgba(0,0,0,.95); align-items:center; justify-content:center; }
#lightbox.active { display:flex; }
#lb-img { width:100vw; height:100vh; object-fit:contain; pointer-events:none; }
#lb-close { position:fixed; top:20px; right:24px; background:none; border:none; color:rgba(255,255,255,.6); font-size:28px; cursor:pointer !important; z-index:601; }
#lb-prev,#lb-next { position:fixed; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.5); border:none; color:rgba(255,255,255,.7); font-size:36px; padding:16px 12px; cursor:pointer !important; z-index:601; }
#lb-prev { left:8px; }
#lb-next { right:8px; }

/* FLOATING BUTTONS */
.sfloat-btn { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; transition:all .3s; cursor:pointer !important; }
.sfloat-btn:hover { transform:scale(1.12); }
#social-float { position:fixed; bottom:100px; right:28px; z-index:250; display:flex; flex-direction:column; align-items:center; gap:14px; }
#ig-float { background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fdf497 5%,#fd5949 45%,#d6249f 60%,#285AEB 90%); box-shadow:0 8px 24px rgba(214,36,159,.3); }
#logo-float { background:#0d1117; border:1px solid rgba(0,212,232,.5); box-shadow:0 8px 24px rgba(0,212,232,.2); display:none; overflow:hidden; }
#logo-float img { width:76%; height:76%; object-fit:contain; filter:invert(1); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="grain"></div>

<div id="loading-screen"><div class="loading-text">Cargando</div></div>

<div id="unavailable">
  <div class="msg-title">Este evento ya no está disponible</div>
  <div class="msg-sub">Cristian Romero Producciones</div>
</div>

<section id="hero">
  <div id="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-logo-seal" id="hero-logo-seal">
      <img class="hero-logo" id="hero-logo-img" alt="CR">
    </div>
    <div class="hero-brand">Cristian Romero Producciones</div>
    <div id="hero-nombres" class="hero-nombres"></div>
    <div class="hero-divider"><span class="hero-divider-star">✦</span></div>
    <div id="hero-fecha" class="hero-fecha"></div>
    <div id="hero-idea"></div>
  </div>
</section>

<section id="gallery-section">
  <div class="gallery-header">
    <div class="gallery-header-eyebrow">Galería del evento</div>
    <div class="gallery-header-title" id="gallery-title"></div>
  </div>
  <div id="gallery-closed-notice" class="gallery-closed-notice" style="display:none">El evento ya finalizó — las fotos siguen disponibles para ver</div>
  <div class="gallery-count" id="gallery-count"></div>
  <div id="gallery-grid"></div>
</section>

<div id="tv-mode">
  <div id="tv-slide"></div>
  <div id="tv-no-fotos" style="display:none">
    <div class="nf-title" id="tv-no-fotos-nombre"></div>
    <div class="nf-sub">Esperando las primeras fotos...</div>
  </div>
  <div id="tv-overlay">
    <img id="tv-logo" alt="CR">
    <div id="tv-nombre"></div>
    <div id="tv-qr-wrap">
      <img id="tv-qr-img" alt="QR">
      <div id="tv-qr-label">Escaneá para subir fotos</div>
    </div>
  </div>
</div>

<button id="btn-upload" title="Subir foto" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">
  +
</button>
<div id="upload-progress">Subiendo foto...</div>

<div id="social-float">
  <a id="logo-float" class="sfloat-btn" href="https://cristianromeroproducciones.com.ar" target="_blank">
    <img id="logo-float-img" alt="CR">
  </a>
  <a id="ig-float" class="sfloat-btn" href="https://www.instagram.com/cristian.romero.producciones" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" width="26" height="26"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke-linecap="round" stroke-width="2.5"/></svg>
  </a>
</div>

<div id="upload-hint"><span>cargá tu foto</span><div class="hint-arrow"></div></div>
<div id="toast"></div>

<div id="lightbox">
  <img id="lb-img" alt="">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <button id="lb-prev" onclick="lbPrev()">‹</button>
  <button id="lb-next" onclick="lbNext()">›</button>
</div>

<script>
const WORKER_URL = 'https://crclub-worker.cristian-romero-digital.workers.dev';
const params = new URLSearchParams(window.location.search);
const EVENT_ID = params.get('e') || '';

let settings = (() => { try { return JSON.parse(localStorage.getItem('crd_settings')) || {}; } catch(e) { return {}; } })();
fetch('https://web.cristian-romero-digital.workers.dev/crd_settings',{headers:{Authorization:'crd2025'}}).then(r=>r.json()).then(function(d){ settings=Object.assign({},settings,{logo_url:d.logoUrl||'',whatsapp:d.waSuffix||'',website:d.entregaWebUrl||'',instagram:d.instagram||'',entregaIgUrl:d.entregaIgUrl||''}); applyBranding(); }).catch(function(){});

let evento = null;
let fotos = [];
let lbIndex = 0;
let slideshowIndex = 0;
let slideshowTimer = null;
let refreshTimer = null;
let isUploading = false;
const IS_TV = window.innerWidth > 1024 && window.innerHeight > 600 && !('ontouchstart' in window);

// ── CURSOR ──
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
if (!IS_TV) {
  document.body.classList.add('custom-cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
    ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px';
  });
}

// ── INIT ──
async function init() {
  if (!EVENT_ID) { showUnavailable(); return; }
  try {
    const res = await fetch(`${WORKER_URL}/eventos/${EVENT_ID}`);
    if (!res.ok) { showUnavailable(); return; }
    evento = await res.json();
    if (evento.error) { showUnavailable(); return; }
  } catch(e) { showUnavailable(); return; }

  applyBranding();
  if (IS_TV) setupTV();
  else setupMobile();
  document.getElementById('loading-screen').classList.add('hidden');
}

function isClosed() {
  if (evento.estado !== 'activo') return true;
  if (evento.cierre_auto && new Date() > new Date(evento.cierre_auto)) return true;
  return false;
}

function applyBranding() {
  const logo = settings.logo_url || '';
  if (logo) {
    const tvLogo = document.getElementById('tv-logo');
    tvLogo.src = logo; tvLogo.style.display = 'block';
    document.getElementById('logo-float-img').src = logo;
    document.getElementById('logo-float').style.display = 'flex';
  }
  const igUrl = settings.entregaIgUrl || (settings.instagram ? 'https://www.instagram.com/'+settings.instagram : '');
  if (igUrl) document.getElementById('ig-float').href = igUrl;
}

// ── MOBILE MODE ──
function setupMobile() {
  document.getElementById('hero-nombres').textContent = evento.nombre;
  document.getElementById('hero-fecha').textContent = formatDate(evento.fecha);
  document.getElementById('gallery-title').textContent = evento.nombre;
  if (evento.portada) document.getElementById('hero-bg').style.backgroundImage = `url('${evento.portada}')`;
  if (!isClosed()) {
    const uploadBtn = document.getElementById('btn-upload');
    uploadBtn.style.display = 'flex';
    document.getElementById('file-input').addEventListener('change', handleFileSelect);
  } else {
    document.getElementById('gallery-closed-notice').style.display = 'block';
  }
  loadFotos();
  refreshTimer = setInterval(loadFotos, 15000);
  const IDEAS = [
    '📸 Selfie con los protagonistas',
    '💃 Bailá y capturá el momento',
    '🥂 El brindis del festejo',
    '🤗 Un abrazo con alguien especial',
    '👯 Foto grupal con amigos',
    '✨ Un detalle de la decoración',
    '😄 Tu mejor pose de la noche',
    '🎉 Un momento espontáneo',
    '👨‍👩‍👧 Con toda la familia',
    '🌟 El momento más divertido'
  ];
  let ideaIdx = 0;
  const ideaEl = document.getElementById('hero-idea');
  ideaEl.textContent = IDEAS[0];
  setTimeout(() => ideaEl.classList.add('visible'), 100);
  setInterval(() => {
    ideaEl.classList.remove('visible');
    ideaEl.classList.add('out');
    setTimeout(() => {
      ideaIdx = (ideaIdx + 1) % IDEAS.length;
      ideaEl.textContent = IDEAS[ideaIdx];
      ideaEl.classList.remove('out');
      ideaEl.classList.add('visible');
    }, 580);
  }, 3500);
  if (!isClosed()) {
    const hint = document.getElementById('upload-hint');
    hint.style.display = 'flex';
    setTimeout(() => {
      window.scrollBy({ top: 90, behavior: 'smooth' });
      setTimeout(() => window.scrollBy({ top: -90, behavior: 'smooth' }), 900);
    }, 2200);
  }
}

// ── TV MODE ──
function setupTV() {
  document.getElementById('tv-mode').classList.add('active');
  document.getElementById('hero').classList.add('hidden');
  document.getElementById('gallery-section').classList.add('hidden');
  document.getElementById('social-float').style.display = 'none';
  const eventUrl = window.location.origin + window.location.pathname + '?e=' + EVENT_ID;
  document.getElementById('tv-qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=' + encodeURIComponent(eventUrl) + '&format=png';
  document.getElementById('tv-nombre').textContent = evento.nombre;
  document.getElementById('tv-no-fotos-nombre').textContent = evento.nombre;
  loadFotosTV();
  refreshTimer = setInterval(loadFotosTV, 15000);
}

// ── FOTOS ──
function getSessionId() {
  let s = localStorage.getItem('qrf_session');
  if (!s) {
    s = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36));
    localStorage.setItem('qrf_session', s);
  }
  return s;
}

async function loadFotos() {
  try {
    const res = await fetch(`${WORKER_URL}/eventos/${EVENT_ID}/fotos?session=${encodeURIComponent(getSessionId())}`);
    const data = await res.json();
    if (data.files) { fotos = data.files; renderGallery(); }
  } catch(e) {}
}

async function loadFotosTV() {
  try {
    const res = await fetch(`${WORKER_URL}/eventos/${EVENT_ID}/fotos`);
    const data = await res.json();
    if (data.files) {
      const prev = fotos.length;
      fotos = data.files;
      if (fotos.length > 0) {
        document.getElementById('tv-no-fotos').style.display = 'none';
        if (prev === 0) startSlideshow();
      } else {
        document.getElementById('tv-no-fotos').style.display = 'flex';
      }
    }
  } catch(e) {}
}

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const count = document.getElementById('gallery-count');
  if (!fotos.length) {
    grid.innerHTML = '<div class="gallery-empty">Todavía no hay fotos. ¡Sé el primero en subir una!</div>';
    count.textContent = '';
    return;
  }
  count.textContent = fotos.length + (fotos.length === 1 ? ' foto' : ' fotos');
  const maxLikes = Math.max(0, ...fotos.map(f => f.likes || 0));
  grid.innerHTML = fotos.map((f, i) => {
    const fid = f.foto_id || '';
    const liked = !!f.liked;
    const likes = f.likes || 0;
    const isWinner = maxLikes > 0 && likes === maxLikes;
    const fill = liked ? '#ff4d6d' : 'none';
    const stroke = liked ? '#ff4d6d' : 'rgba(255,255,255,.9)';
    return `<div class="gallery-item" onclick="openLightbox(${i})">
      ${isWinner ? '<div class="photo-winner">👑</div>' : ''}
      <img src="${f.url}" alt="${f.name}" loading="lazy">
      <div class="photo-heart${liked ? ' liked' : ''}" onclick="event.stopPropagation();likePhoto('${fid}',${i})">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="${fill}" stroke="${stroke}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${likes ? `<span>${likes}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

const _liking = new Set();

async function likePhoto(fotoId, idx) {
  if (!fotoId || _liking.has(fotoId)) return;
  _liking.add(fotoId);
  const f = fotos[idx];
  const wasLiked = !!f.liked;
  f.liked = !wasLiked;
  f.likes = wasLiked ? Math.max(0, (f.likes || 0) - 1) : (f.likes || 0) + 1;
  updateHeartUI(idx, f);
  updateWinnerCrown();
  try {
    const res = await fetch(`${WORKER_URL}/eventos/${EVENT_ID}/fotos/${fotoId}/like`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: getSessionId() })
    });
    const data = await res.json();
    if (data.ok) {
      f.liked = data.liked;
      f.likes = data.likes;
      updateHeartUI(idx, f);
      updateWinnerCrown();
    }
  } catch(e) {
    f.liked = wasLiked;
    f.likes = wasLiked ? (f.likes || 0) + 1 : Math.max(0, (f.likes || 0) - 1);
    updateHeartUI(idx, f);
    updateWinnerCrown();
  } finally {
    _liking.delete(fotoId);
  }
}

function updateHeartUI(idx, f) {
  const items = document.querySelectorAll('.gallery-item');
  if (!items[idx]) return;
  const heart = items[idx].querySelector('.photo-heart');
  if (!heart) return;
  const liked = !!f.liked;
  heart.className = 'photo-heart' + (liked ? ' liked' : '');
  const fill = liked ? '#ff4d6d' : 'none';
  const stroke = liked ? '#ff4d6d' : 'rgba(255,255,255,.9)';
  heart.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="${fill}" stroke="${stroke}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${f.likes ? `<span>${f.likes}</span>` : ''}`;
}

function updateWinnerCrown() {
  const maxLikes = Math.max(0, ...fotos.map(f => f.likes || 0));
  document.querySelectorAll('.gallery-item').forEach((el, i) => {
    let crown = el.querySelector('.photo-winner');
    const isWinner = maxLikes > 0 && (fotos[i] && (fotos[i].likes || 0) === maxLikes);
    if (isWinner && !crown) {
      crown = document.createElement('div');
      crown.className = 'photo-winner';
      crown.textContent = '👑';
      el.prepend(crown);
    } else if (!isWinner && crown) {
      crown.remove();
    }
  });
}

// ── TV SLIDESHOW ──
function startSlideshow() {
  if (slideshowTimer) clearInterval(slideshowTimer);
  showSlide(0);
  slideshowTimer = setInterval(() => {
    if (fotos.length) showSlide((slideshowIndex + 1) % fotos.length);
  }, 5000);
}

function showSlide(index) {
  slideshowIndex = index;
  const slide = document.getElementById('tv-slide');
  slide.classList.add('fade-out');
  setTimeout(() => {
    slide.style.backgroundImage = `url('${fotos[index].url}')`;
    slide.classList.remove('fade-out');
  }, 400);
}

// ── UPLOAD ──
async function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file || isUploading) return;
  if (!file.type.startsWith('image/')) { showToast('Solo se permiten imágenes'); return; }
  if (file.size > 15 * 1024 * 1024) { showToast('La imagen es demasiado grande (máx 15MB)'); return; }

  isUploading = true;
  document.getElementById('upload-progress').style.display = 'block';

  const fd = new FormData();
  fd.append('file', file);

  try {
    const res = await fetch(`${WORKER_URL}/eventos/${EVENT_ID}/fotos`, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.ok) {
      const msg = evento.moderacion
        ? 'Foto enviada. Quedará visible tras revisión.'
        : '¡Foto subida! Aparecerá en la galería en breve.';
      showToast(msg);
      setTimeout(loadFotos, 3000);
    } else {
      showToast(data.error || 'Error al subir. Intenta de nuevo.');
    }
  } catch(err) {
    showToast('Error de conexión. Intenta de nuevo.');
  } finally {
    isUploading = false;
    document.getElementById('upload-progress').style.display = 'none';
    e.target.value = '';
  }
}

// ── LIGHTBOX ──
function openLightbox(i) {
  lbIndex = i;
  document.getElementById('lb-img').src = fotos[i].url;
  document.getElementById('lightbox').classList.add('active');
  document.getElementById('tv-mode').style.pointerEvents = 'none';
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); document.getElementById('tv-mode').style.pointerEvents = ''; }
function lbPrev() { lbIndex = (lbIndex - 1 + fotos.length) % fotos.length; document.getElementById('lb-img').src = fotos[lbIndex].url; }
function lbNext() { lbIndex = (lbIndex + 1) % fotos.length; document.getElementById('lb-img').src = fotos[lbIndex].url; }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbPrev();
  if (e.key === 'ArrowRight') lbNext();
});

// ── HELPERS ──
function showUnavailable() {
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('unavailable').style.display = 'flex';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${parseInt(day)} de ${meses[parseInt(m)-1]} de ${y}`;
}

document.addEventListener('DOMContentLoaded', init);
</script>
